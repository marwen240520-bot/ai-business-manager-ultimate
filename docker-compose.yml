version: '3.8' 
 
services: 
  mongodb: 
    image: mongo:6 
    container_name: aibm-mongodb 
    restart: always 
    ports: 
      - "27017:27017" 
    volumes: 
      - mongodb_data:/data/db 
    environment: 
      MONGO_INITDB_ROOT_USERNAME: admin 
      MONGO_INITDB_ROOT_PASSWORD: admin123 
    networks: 
      - aibm-network 
 
  redis: 
    image: redis:7-alpine 
    container_name: aibm-redis 
    restart: always 
    ports: 
      - "6379:6379" 
    volumes: 
      - redis_data:/data 
    networks: 
      - aibm-network 
 
  elasticsearch: 
    image: elasticsearch:8.10.0 
    container_name: aibm-elasticsearch 
    restart: always 
    environment: 
      - discovery.type=single-node 
      - xpack.security.enabled=false 
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" 
    ports: 
      - "9200:9200" 
    volumes: 
      - elasticsearch_data:/usr/share/elasticsearch/data 
    networks: 
      - aibm-network 
 
  api-gateway: 
    build: ./backend/api-gateway 
    container_name: aibm-api-gateway 
    restart: always 
    ports: 
      - "8000:8000" 
    depends_on: 
      - mongodb 
      - redis 
    environment: 
      - NODE_ENV=production 
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/ 
      - REDIS_URL=redis://redis:6379 
      - JWT_SECRET=prod_secret_2026 
      - FRONTEND_URL=http://localhost:3000 
    networks: 
      - aibm-network 
 
  auth-service: 
    build: ./backend/services/auth 
    container_name: aibm-auth-service 
    restart: always 
    depends_on: 
      - mongodb 
      - redis 
    environment: 
      - NODE_ENV=production 
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/auth_db 
      - REDIS_URL=redis://redis:6379 
      - JWT_SECRET=prod_secret_2026 
    networks: 
      - aibm-network 
 
  frontend: 
    build: ./frontend 
    container_name: aibm-frontend 
    restart: always 
    ports: 
      - "3000:3000" 
    depends_on: 
      - api-gateway 
    environment: 
      - REACT_APP_API_URL=http://localhost:8000/api 
    networks: 
      - aibm-network 
 
volumes: 
  mongodb_data: 
  redis_data: 
  elasticsearch_data: 
 
networks: 
  aibm-network: 
    driver: bridge 
